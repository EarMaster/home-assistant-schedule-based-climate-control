blueprint:
  name: Schedule Based Climate Control
  description: >
    # Schedule Based Climate Control

    A professional, schedule-based climate control blueprint. Features include safety-first window/door sensor integration with delays, vacation mode, and a "Party Mode" override. Supports multiple climate entities, hybrid inputs (static values or helpers), and works with both Celsius and Fahrenheit. Perfect for studio and bedroom automation.

    Remember to create the necessary [input helpers](/config/helpers) (at least a schedule, optionally input_booleans and input_numbers) before using this blueprint. Adjust thresholds and target temperatures to fit your comfort preferences and climate device capabilities.
    
    *Version:* 1.1.3

  source_url: https://raw.githubusercontent.com/EarMaster/home-assistant-schedule-based-climate-control/main/schedule_based_climate_control.yaml
  domain: automation
  homeassistant:
    min_version: 2024.8.0
  input:
    climate_devices:
      name: Climate Entities
      selector:
        entity:
          domain: climate
          multiple: true
    temp_sensor:
      name: Temperature Sensor
      selector:
        entity:
          domain: sensor
          device_class: temperature
    climate_schedule:
      name: Schedule Helper
      selector:
        entity:
          domain: schedule
    window_sensors:
      name: Window/Door Sensors (Optional)
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    window_delay:
      name: Window Delay (Seconds)
      default: 60
      selector:
        number:
          min: 0
          max: 600
          unit_of_measurement: "s"
    vacation_mode:
      name: Vacation Mode Helper
      selector:
        entity:
          domain: input_boolean
    party_mode:
      name: Party Mode (Override)
      selector:
        entity:
          domain: input_boolean

    # --- COOLING SECTION ---
    cooling_settings:
      name: Cooling Settings
      icon: mdi:snowflake
      description: Target temperatures and thresholds for cooling devices.
      input:
        target_temp_cool_ent:
          name: Target Temperature Helper (Optional)
          description: Select an input_number.
          selector:
            entity:
              domain: input_number
        target_temp_cool:
          name: Target Temperature
          description: Used if no helper is selected.
          default: 21
          selector:
            number:
              min: 10
              max: 35
              step: 0.5
              unit_of_measurement: "°C"

        threshold_hot_ent:
          name: Threshold Temperature Helper (Optional)
          description: Start cooling above this helper.
          selector:
            entity:
              domain: input_number
        threshold_hot:
          name: Threshold Temperature
          description: Used if no helper is selected.
          default: 26
          selector:
            number:
              min: 10
              max: 40
              step: 0.5
              unit_of_measurement: "°C"

    # --- HEATING SECTION ---
    heating_settings:
      name: Heating Settings
      icon: mdi:fire
      description: Target temperatures and thresholds for heating devices.
      input:
        target_temp_heat_ent:
          name: Target Temperature Helper (Optional)
          description: Select an input_number.
          selector:
            entity:
              domain: input_number
        target_temp_heat:
          name: Target Temperature
          description: Used if no helper is selected.
          default: 22
          selector:
            number:
              min: 10
              max: 35
              step: 0.5
              unit_of_measurement: "°C"

        threshold_cold_ent:
          name: Threshold Temperature Helper (Optional)
          description: Start heating below this helper.
          selector:
            entity:
              domain: input_number
        threshold_cold:
          name: Threshold Temperature
          description: Used if no helper is selected.
          default: 19
          selector:
            number:
              min: 5
              max: 25
              step: 0.5
              unit_of_measurement: "°C"

mode: restart

trigger:
  - platform: state
    entity_id: !input temp_sensor
  - platform: state
    entity_id: !input climate_schedule
  - platform: state
    entity_id: !input vacation_mode
  - platform: state
    entity_id: !input party_mode
  - platform: state
    entity_id: !input window_sensors
    to: "on"
    for:
      seconds: !input window_delay
  - platform: state
    entity_id: !input window_sensors
    to: "off"
    for:
      seconds: !input window_delay

action:
  - variables:
      devices: !input climate_devices
      is_party: "{{ is_state(!input party_mode, 'on') }}"
      is_vacation: "{{ is_state(!input vacation_mode, 'on') }}"
      is_window_open: "{{ expand(!input window_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
      is_on_schedule: "{{ is_state(!input climate_schedule, 'on') }}"
      current_temp: "{{ states(!input temp_sensor) | float(0) }}"

      goal_cool: >
        {% set ent = !input target_temp_cool_ent %}
        {% if ent != none and states(ent) | is_number %} {{ states(ent) | float }}
        {% else %} {{ !input target_temp_cool | float }} {% endif %}
      
      limit_hot: >
        {% set ent = !input threshold_hot_ent %}
        {% if ent != none and states(ent) | is_number %} {{ states(ent) | float }}
        {% else %} {{ !input threshold_hot | float }} {% endif %}

      goal_heat: >
        {% set ent = !input target_temp_heat_ent %}
        {% if ent != none and states(ent) | is_number %} {{ states(ent) | float }}
        {% else %} {{ !input target_temp_heat | float }} {% endif %}

      limit_cold: >
        {% set ent = !input threshold_cold_ent %}
        {% if ent != none and states(ent) | is_number %} {{ states(ent) | float }}
        {% else %} {{ !input threshold_cold | float }} {% endif %}

  - choose:
      - conditions:
          - or:
              - condition: template
                value_template: "{{ is_vacation }}"
              - condition: template
                value_template: "{{ is_window_open }}"
              - condition: template
                value_template: "{{ not is_on_schedule }}"
        sequence:
          - action: climate.turn_off
            target: { entity_id: "{{ devices }}" }
      - conditions:
          - condition: template
            value_template: "{{ is_party }}"
        sequence:
          - stop: "Party Mode active"
      - conditions:
          - condition: template
            value_template: "{{ not is_vacation and not is_window_open and is_on_schedule }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ current_temp >= limit_hot | float }}"
                sequence:
                  - action: climate.set_temperature
                    data: { hvac_mode: cool, temperature: "{{ goal_cool }}" }
                    target: { entity_id: "{{ devices }}" }
              - conditions:
                  - condition: template
                    value_template: "{{ current_temp <= limit_cold | float }}"
                sequence:
                  - action: climate.set_temperature
                    data: { hvac_mode: heat, temperature: "{{ goal_heat }}" }
                    target: { entity_id: "{{ devices }}" }
              - conditions:
                  - condition: template
                    value_template: "{{ (goal_heat | float) + 0.5 < current_temp < (goal_cool | float) - 0.5 }}"
                sequence:
                  - action: climate.turn_off
                    target: { entity_id: "{{ devices }}" }