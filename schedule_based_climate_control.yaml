blueprint:
  name: Schedule Based Climate Control
  description: >
    # Schedule Based Climate Control

    A professional, schedule-based climate control blueprint. Features include safety-first window/door sensor integration with delays, vacation mode, and a "Party Mode" override. Supports multiple climate entities, hybrid inputs (static values or helpers), and works with both Celsius and Fahrenheit. Perfect for studio and bedroom automation.

    Remember to create the necessary [input helpers](/config/helpers) (at least a schedule, optionally input_booleans and input_numbers) before using this blueprint. Adjust thresholds and target temperatures to fit your comfort preferences and climate device capabilities.
    
    *Version:* 1.0.5

  source_url: https://raw.githubusercontent.com/EarMaster/home-assistant-schedule-based-climate-control/main/schedule_based_climate_control.yaml
  domain: automation
  input:
    climate_devices:
      name: Climate Entities
      selector:
        entity:
          domain: climate
          multiple: true
    temp_sensor:
      name: Temperature Sensor
      selector:
        entity:
          domain: sensor
          device_class: temperature
    climate_schedule:
      name: Schedule Helper
      selector:
        entity:
          domain: schedule
    window_sensors:
      name: Window/Door Sensors (Optional)
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    window_delay:
      name: Window Delay (Seconds)
      default: 60
      selector:
        number:
          min: 0
          max: 600
          unit_of_measurement: "s"
    vacation_mode:
      name: Vacation Mode Helper
      default: []
      selector:
        entity:
          domain: input_boolean
    party_mode:
      name: Party Mode (Override)
      default: []
      selector:
        entity:
          domain: input_boolean

    # --- COOLING INPUTS ---
    target_temp_cool_ent:
      name: (Cooling) Target Helper
      description: Select an input_number (Priority 1)
      default: []
      selector:
        entity:
          domain: input_number
    target_temp_cool_c:
      name: (Cooling) Target °C
      description: Fixed Celsius value (Priority 2)
      default: 21
      selector:
        number:
          min: 10
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
    target_temp_cool_f:
      name: (Cooling) Target °F
      description: Fixed Fahrenheit value (Priority 3)
      default: 70
      selector:
        number:
          min: 45
          max: 95
          step: 1
          unit_of_measurement: "°F"

    threshold_hot_ent:
      name: (Cooling) Threshold Helper
      description: Start cooling above this helper (Priority 1)
      default: []
      selector:
        entity:
          domain: input_number
    threshold_hot_c:
      name: (Cooling) Threshold °C
      description: Start cooling above this °C (Priority 2)
      default: 26
      selector:
        number:
          min: 10
          max: 40
          step: 0.5
          unit_of_measurement: "°C"
    threshold_hot_f:
      name: (Cooling) Threshold °F
      description: Start cooling above this °F (Priority 3)
      default: 79
      selector:
        number:
          min: 50
          max: 105
          step: 1
          unit_of_measurement: "°F"

    # --- HEATING INPUTS ---
    target_temp_heat_ent:
      name: (Heating) Target Helper
      default: []
      selector:
        entity:
          domain: input_number
    target_temp_heat_c:
      name: (Heating) Target °C
      default: 22
      selector:
        number:
          min: 10
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
    target_temp_heat_f:
      name: (Heating) Target °F
      default: 72
      selector:
        number:
          min: 45
          max: 95
          step: 1
          unit_of_measurement: "°F"

    threshold_cold_ent:
      name: (Heating) Threshold Helper
      default: []
      selector:
        entity:
          domain: input_number
    threshold_cold_c:
      name: (Heating) Threshold °C
      default: 19
      selector:
        number:
          min: 5
          max: 25
          step: 0.5
          unit_of_measurement: "°C"
    threshold_cold_f:
      name: (Heating) Threshold °F
      default: 66
      selector:
        number:
          min: 40
          max: 80
          step: 1
          unit_of_measurement: "°F"

mode: restart

trigger:
  - platform: state
    entity_id: !input temp_sensor
  - platform: state
    entity_id: !input climate_schedule
  - platform: state
    entity_id: !input vacation_mode
  - platform: state
    entity_id: !input party_mode
  - platform: state
    entity_id: !input window_sensors
    to: "on"
    for:
      seconds: !input window_delay
  - platform: state
    entity_id: !input window_sensors
    to: "off"
    for:
      seconds: !input window_delay

action:
  - vars:
      devices: !input climate_devices
      is_party: "{{ is_state(!input party_mode, 'on') }}"
      is_vacation: "{{ is_state(!input vacation_mode, 'on') }}"
      is_window_open: "{{ expand(!input window_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
      is_on_schedule: "{{ is_state(!input climate_schedule, 'on') }}"
      current_temp: "{{ states(!input temp_sensor) | float(0) }}"

      goal_cool: >
        {% set ent = !input target_temp_cool_ent %}
        {% if ent != none and states(ent) | is_number %} {{ states(ent) | float }}
        {% elif !input target_temp_cool_c is number %} {{ !input target_temp_cool_c }}
        {% else %} {{ !input target_temp_cool_f }} {% endif %}
      
      limit_hot: >
        {% set ent = !input threshold_hot_ent %}
        {% if ent != none and states(ent) | is_number %} {{ states(ent) | float }}
        {% elif !input threshold_hot_c is number %} {{ !input threshold_hot_c }}
        {% else %} {{ !input threshold_hot_f }} {% endif %}

      goal_heat: >
        {% set ent = !input target_temp_heat_ent %}
        {% if ent != none and states(ent) | is_number %} {{ states(ent) | float }}
        {% elif !input target_temp_heat_c is number %} {{ !input target_temp_heat_c }}
        {% else %} {{ !input target_temp_heat_f }} {% endif %}

      limit_cold: >
        {% set ent = !input threshold_cold_ent %}
        {% if ent != none and states(ent) | is_number %} {{ states(ent) | float }}
        {% elif !input threshold_cold_c is number %} {{ !input threshold_cold_c }}
        {% else %} {{ !input threshold_cold_f }} {% endif %}

  - choose:
      - conditions:
          - or:
              - condition: template
                value_template: "{{ is_vacation }}"
              - condition: template
                value_template: "{{ is_window_open }}"
              - condition: template
                value_template: "{{ not is_on_schedule }}"
        sequence:
          - action: climate.turn_off
            target: { entity_id: "{{ devices }}" }
      - conditions:
          - condition: template
            value_template: "{{ is_party }}"
        sequence:
          - stop: "Party Mode active"
      - conditions:
          - condition: template
            value_template: "{{ not is_vacation and not is_window_open and is_on_schedule }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ current_temp >= limit_hot | float }}"
                sequence:
                  - action: climate.set_temperature
                    data: { hvac_mode: cool, temperature: "{{ goal_cool }}" }
                    target: { entity_id: "{{ devices }}" }
              - conditions:
                  - condition: template
                    value_template: "{{ current_temp <= limit_cold | float }}"
                sequence:
                  - action: climate.set_temperature
                    data: { hvac_mode: heat, temperature: "{{ goal_heat }}" }
                    target: { entity_id: "{{ devices }}" }
              - conditions:
                  - condition: template
                    value_template: "{{ (goal_heat | float) + 0.5 < current_temp < (goal_cool | float) - 0.5 }}"
                sequence:
                  - action: climate.turn_off
                    target: { entity_id: "{{ devices }}" }
